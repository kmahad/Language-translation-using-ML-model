# ============================================================
# Statistical Machine Translation — Configuration
# ============================================================
# Modify these settings for your specific translation task.
# CLI overrides: python scripts/train.py --config config/default.yaml --epochs 10
# ============================================================

# --- Data Settings ---
data:
  # Path to your parallel corpus (CSV or TSV)
  data_file: "../eng_-french.csv"
  # Column names in your CSV/TSV
  src_column: "English words/sentences"
  tgt_column: "French words/sentences"
  # Language codes (used for logging and file naming)
  src_lang: "en"
  tgt_lang: "fr"
  # File separator: "," for CSV, "\t" for TSV
  separator: ","
  # Maximum sequence length (sentences longer than this are truncated)
  max_seq_len: 64
  # Train / Validation / Test split ratios (must sum to 1.0)
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  # Random seed for reproducible splits
  split_seed: 42

# --- Tokenizer Settings ---
tokenizer:
  # SentencePiece vocabulary size per language
  vocab_size: 16000
  # Model type: "bpe" or "unigram"
  model_type: "bpe"
  # Character coverage (1.0 recommended for non-Latin scripts)
  character_coverage: 1.0
  # Whether to use a joint (shared) vocabulary for both languages
  shared_vocab: false
  # Directory to save trained tokenizer models
  model_dir: "data/processed"

# --- SMT Model Settings ---
model:
  # Maximum phrase length for phrase extraction
  max_phrase_len: 5
  # N-gram language model order (e.g. 3 = trigram)
  lm_order: 3
  # Number of EM iterations for IBM Model 1 word alignment
  alignment_iterations: 10

# --- Training Settings ---
training:
  # Number of epochs for weight tuning on validation set
  epochs: 10
  batch_size: 64
  num_workers: 0
  # Checkpoint directory
  checkpoint_dir: "checkpoints"
  # Random seed for reproducibility
  seed: 42
  # Early stopping patience (epochs without improvement)
  early_stopping_patience: 5
  # Save checkpoint every N epochs
  checkpoint_every: 5

# --- Inference Settings ---
inference:
  # Beam search beam size (1 = greedy decoding)
  beam_size: 4
  # Maximum decoding length (in tokens)
  max_decode_len: 64

# --- Logging ---
logging:
  # Log directory
  log_dir: "logs"
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  # Print a sample translation every N batches during training
  sample_every: 500
