# ============================================================
# Neural Machine Translation — Configuration
# ============================================================
# Modify these settings for your specific translation task.
# CLI overrides: python scripts/train.py --config config/default.yaml --epochs 50
# ============================================================

# --- Data Settings ---
data:
  # Path to your parallel corpus (CSV or TSV)
  data_file: "../eng_-french.csv"
  # Column names in your CSV/TSV
  src_column: "English words/sentences"
  tgt_column: "French words/sentences"
  # Language codes (used for logging and file naming)
  src_lang: "en"
  tgt_lang: "fr"
  # File separator: "," for CSV, "\t" for TSV
  separator: ","
  # Maximum sequence length (sentences longer than this are truncated)
  max_seq_len: 64
  # Train / Validation / Test split ratios (must sum to 1.0)
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  # Random seed for reproducible splits
  split_seed: 42

# --- Tokenizer Settings ---
tokenizer:
  # SentencePiece vocabulary size per language
  vocab_size: 16000
  # Model type: "bpe" or "unigram"
  model_type: "bpe"
  # Character coverage (1.0 recommended for non-Latin scripts)
  character_coverage: 1.0
  # Whether to use a joint (shared) vocabulary for both languages
  shared_vocab: false
  # Directory to save trained tokenizer models
  model_dir: "data/processed"

# --- Model Architecture ---
model:
  # Embedding / hidden dimension
  d_model: 256
  # Number of attention heads
  n_heads: 4
  # Number of encoder layers
  n_encoder_layers: 3
  # Number of decoder layers
  n_decoder_layers: 3
  # Feed-forward inner dimension
  d_ff: 512
  # Dropout rate
  dropout: 0.1
  # Tie target embedding weights with output projection
  weight_tying: true

# --- Training Settings ---
training:
  # Batch size (reduce if GPU runs out of memory)
  batch_size: 64
  # Number of training epochs
  epochs: 20
  # Peak learning rate
  learning_rate: 0.0003
  # Warmup steps for Noam scheduler
  warmup_steps: 2000
  # Label smoothing for cross-entropy loss
  label_smoothing: 0.1
  # Gradient clipping max norm
  grad_clip: 1.0
  # Save checkpoint every N epochs
  checkpoint_every: 5
  # Early stopping patience (epochs without improvement)
  early_stopping_patience: 5
  # Checkpoint directory
  checkpoint_dir: "checkpoints"
  # Random seed for reproducibility
  seed: 42
  # Number of DataLoader workers
  num_workers: 2

# --- Inference Settings ---
inference:
  # Beam search beam size (1 = greedy decoding)
  beam_size: 4
  # Maximum decoding length
  max_decode_len: 64
  # Length normalization alpha for beam search
  length_penalty: 0.6
  # Repetition penalty (1.0 = no penalty, >1.0 penalizes word loops)
  repetition_penalty: 1.5

# --- Logging ---
logging:
  # Log directory
  log_dir: "logs"
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  # Print a sample translation every N batches during training
  sample_every: 500
